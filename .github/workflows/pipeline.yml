name: Daily CCQS Pipeline

on:
  schedule:
    # Mon-Fri, fires at exactly 4:30 PM ET year-round (30 min after market
    # close). GitHub Actions cron is UTC and has no DST awareness, so we
    # use TWO cron entries — one for each DST regime — and gate the
    # actual pipeline behind a TZ-aware guard job. Only one of the two
    # cron firings actually does work each day; the other is a no-op
    # within ~10 seconds of the guard check.
    #
    #   - cron: '30 20 * * 1-5'  → 4:30 PM ET during EDT (Mar-Nov)
    #   - cron: '30 21 * * 1-5'  → 4:30 PM ET during EST (Nov-Mar)
    #
    # The `guard` job below uses TZ=America/New_York to check the actual
    # ET hour and emits should_run=true ONLY when ET hour == 16. The
    # `refresh` job has `needs: guard` and `if: needs.guard.outputs.should_run == 'true'`,
    # so the heavy pipeline executes exactly once per weekday at 4:30 PM ET.
    - cron: '30 20 * * 1-5'
    - cron: '30 21 * * 1-5'
  workflow_dispatch: {}  # manual trigger from Actions UI (bypasses guard)

# Need write access to push the refreshed dashboard cache back to main.
permissions:
  contents: write

jobs:
  # ----------------------------------------------------------------------
  # DST-aware time guard. Always runs (cheap), but only signals
  # should_run=true when the current ET wall-clock hour is 16 (4 PM).
  # Manual workflow_dispatch always proceeds (bypasses the hour check).
  # ----------------------------------------------------------------------
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_run: ${{ steps.tzcheck.outputs.should_run }}
    steps:
      - name: Check ET hour (DST guard)
        id: tzcheck
        run: |
          ET_HOUR=$(TZ=America/New_York date +%H)
          ET_FULL=$(TZ=America/New_York date)
          UTC_FULL=$(date -u)
          echo "UTC time: $UTC_FULL"
          echo "ET  time: $ET_FULL"
          echo "ET hour:  $ET_HOUR"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — proceeding regardless of hour."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "$ET_HOUR" = "16" ]; then
            echo "ET hour is 16 (4 PM) — proceeding."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "ET hour is $ET_HOUR (not 16). Skipping scheduled run."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  refresh:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # The full pipeline requires three pre-feature inputs that are
      # gitignored on the repo (.gitignore: data/cache/*, except the
      # slim dashboard subset). The CI runner starts with a fresh
      # checkout so none of these are present — we must build them
      # from scratch every run.
      #
      # Order (matches local-dev README):
      #   1. compute.loader        → fetches OHLCV from yfinance for the
      #                              full universe + benchmarks, writes
      #                              data/cache/ohlcv_daily.parquet
      #   2. compute.data_quality  → reads OHLCV, writes
      #                              data/cache/data_quality_report.json
      #                              (PASS / WARNING / FAIL gates)
      #   3. compute.features      → consumes both above, writes
      #                              data/cache/features.parquet
      - name: Fetch OHLCV from yfinance
        run: python -m compute.loader

      - name: Run data-quality firewall
        run: python -m compute.data_quality

      - name: Compute features
        run: python -m compute.features

      - name: Standardize features (z-scores)
        run: python -m compute.standardization

      - name: Run end-to-end pipeline
        run: python -m compute.pipeline

      - name: Build slim dashboard cache for Streamlit Cloud
        run: python -m compute.build_dashboard_cache

      - name: Commit refreshed dashboard cache to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache/dashboard/
          if git diff --cached --quiet; then
            echo "No dashboard cache changes to commit."
          else
            git commit -m "ci: refresh dashboard cache ($(date -u +%Y-%m-%d))"
            git push origin HEAD:main
          fi

      - name: Run data-dependent tests against fresh outputs
        run: |
          pip install pytest
          pytest tests/test_phase2_spot_check.py tests/test_phase3_validation.py -v --tb=short
        continue-on-error: true

      - name: Upload data/cache artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ccqs-cache-${{ github.run_number }}
          path: |
            data/cache/
            !data/cache/sandbox/
          retention-days: 90

      - name: Upload sanity-checks report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sanity-checks-${{ github.run_number }}
          path: data/cache/sanity_checks.json
          retention-days: 90
