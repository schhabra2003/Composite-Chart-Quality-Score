name: Daily CCQS Pipeline

on:
  schedule:
    # Phase 26 (2026-05-28): moved from 4:30 PM ET to 4:05 PM ET (5 min
    # after NYSE close at 4:00 PM ET).
    #
    # Mon-Fri, fires at exactly 4:05 PM ET year-round (5 min after market
    # close). GitHub Actions cron is UTC and has no DST awareness, so we
    # use TWO cron entries — one for each DST regime — and gate the
    # actual pipeline behind a TZ-aware guard job. Only one of the two
    # cron firings actually does work each day; the other is a no-op
    # within ~10 seconds of the guard check.
    #
    #   - cron: '5 20 * * 1-5'  → 4:05 PM ET during EDT (Mar-Nov)
    #   - cron: '5 21 * * 1-5'  → 4:05 PM ET during EST (Nov-Mar)
    #
    # The `guard` job below uses TZ=America/New_York to check the actual
    # ET hour and emits should_run=true ONLY when ET hour == 16. The
    # `refresh` job has `needs: guard` and `if: needs.guard.outputs.should_run == 'true'`,
    # so the heavy pipeline executes exactly once per weekday at 4:05 PM ET.
    - cron: '5 20 * * 1-5'
    - cron: '5 21 * * 1-5'
  workflow_dispatch: {}  # manual trigger from Actions UI (bypasses guard)

# Need write access to push the refreshed dashboard cache back to main.
permissions:
  contents: write

jobs:
  # ----------------------------------------------------------------------
  # DST-aware time guard. Always runs (cheap), but only signals
  # should_run=true when the current ET wall-clock hour is 16 (4 PM).
  # Manual workflow_dispatch always proceeds (bypasses the hour check).
  # ----------------------------------------------------------------------
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_run: ${{ steps.tzcheck.outputs.should_run }}
    steps:
      - name: Check ET hour (DST guard)
        id: tzcheck
        run: |
          ET_HOUR=$(TZ=America/New_York date +%H)
          ET_FULL=$(TZ=America/New_York date)
          UTC_FULL=$(date -u)
          echo "UTC time: $UTC_FULL"
          echo "ET  time: $ET_FULL"
          echo "ET hour:  $ET_HOUR"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — proceeding regardless of hour."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "$ET_HOUR" = "16" ]; then
            echo "ET hour is 16 (4 PM) — proceeding."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "ET hour is $ET_HOUR (not 16). Skipping scheduled run."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  refresh:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # The full pipeline requires three pre-feature inputs that are
      # gitignored on the repo (.gitignore: data/cache/*, except the
      # slim dashboard subset). The CI runner starts with a fresh
      # checkout so none of these are present — we must build them
      # from scratch every run.
      #
      # Order (matches local-dev README):
      #   1. compute.loader        → fetches OHLCV from yfinance for the
      #                              full universe + benchmarks, writes
      #                              data/cache/ohlcv_daily.parquet
      #   2. compute.data_quality  → reads OHLCV, writes
      #                              data/cache/data_quality_report.json
      #                              (PASS / WARNING / FAIL gates)
      #   3. compute.features      → consumes both above, writes
      #                              data/cache/features.parquet
      - name: Fetch OHLCV from yfinance
        run: python -m compute.loader

      - name: Run data-quality firewall
        run: python -m compute.data_quality

      - name: Compute features
        run: python -m compute.features

      - name: Standardize features (z-scores)
        run: python -m compute.standardization

      - name: Run end-to-end pipeline
        run: python -m compute.pipeline

      - name: Build slim dashboard cache for Streamlit Cloud
        run: python -m compute.build_dashboard_cache

      # CRITICAL HARD GATES (Phase 14R.J).
      # Tests run BEFORE the dashboard-cache commit, so a broken pipeline
      # cannot pollute the live site. If ANY of these four suites fail,
      # the workflow fails, no commit happens, and the prior good cache
      # stays in place on `main`. This is the "no issues whatsoever"
      # promise per user direction.
      #
      # Four hard-gate test suites:
      #   1. test_universe_coverage   — yfinance fetched all universe tickers,
      #                                 latest date recent, benchmarks present,
      #                                 data quality firewall passes ≥ 90%.
      #   2. test_cache_freshness     — dashboard caches present + non-empty,
      #                                 latest date within 7 days, 11 sanity
      #                                 checks pass, regime context current.
      #   3. test_pipeline_integrity  — 11 sanity checks pass, CCQS in [0,100],
      #                                 grade/state/tier/setup distributions
      #                                 non-degenerate, STATE_WEIGHTS sum to
      #                                 1.0, confidence-blend mechanism intact.
      #   4. tests/reference/test_tv_parity — 10 canary tickers numerically
      #                                       pinned (140 field checks).
      #
      # Legacy spot-check tests run AFTER the commit (soft gates).
      - name: Install pytest
        run: pip install pytest

      - name: Hard-gate tests (universe / cache / pipeline / IC baseline / TV parity)
        run: |
          pytest tests/test_universe_coverage.py \
                 tests/test_cache_freshness.py \
                 tests/test_pipeline_integrity.py \
                 tests/test_ic_baseline.py \
                 tests/reference/test_tv_parity.py \
                 -v --tb=short

      - name: Commit refreshed dashboard cache to main (only if hard-gate tests pass)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache/dashboard/
          if git diff --cached --quiet; then
            echo "No dashboard cache changes to commit."
            exit 0
          fi
          git commit -m "ci: refresh dashboard cache ($(date -u +%Y-%m-%d))"
          # Robust push with rebase-on-conflict retry. The pipeline runs for
          # ~15-20 minutes; in that window a developer may push to main, which
          # would cause a non-fast-forward rejection of our push. Retry with
          # rebase up to 3 times to absorb concurrent commits.
          for attempt in 1 2 3; do
            git fetch origin main
            git pull --rebase origin main
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying after fetch+rebase..."
            sleep 5
          done
          echo "Push failed after 3 attempts"
          exit 1

      - name: Soft-gate legacy spot-check tests
        run: |
          pytest tests/test_phase2_spot_check.py tests/test_phase3_validation.py -v --tb=short
        continue-on-error: true

      - name: Upload data/cache artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ccqs-cache-${{ github.run_number }}
          path: |
            data/cache/
            !data/cache/sandbox/
          retention-days: 90

      - name: Upload sanity-checks report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sanity-checks-${{ github.run_number }}
          path: data/cache/sanity_checks.json
          retention-days: 90
