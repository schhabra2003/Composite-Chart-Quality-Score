name: Daily CCQS Pipeline

on:
  schedule:
    # Mon-Fri at 21:30 UTC.
    # 4:30 PM EST (US winter) / 5:30 PM EDT (US summer).
    # Always 30+ minutes after the 4:00 PM ET market close.
    # GitHub Actions cron is fixed UTC; this UTC slot gives us 4:30 PM ET
    # for the half of the year EST is active. During EDT it runs 5:30 PM ET,
    # which is also fine (still post-close, still daily). We accept the
    # 1-hour DST drift rather than two cron lines + duplicate work.
    - cron: '30 21 * * 1-5'
  workflow_dispatch: {}  # manual trigger from Actions UI

# Need write access to push the refreshed dashboard cache back to main.
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # The full pipeline requires three pre-feature inputs that are
      # gitignored on the repo (.gitignore: data/cache/*, except the
      # slim dashboard subset). The CI runner starts with a fresh
      # checkout so none of these are present — we must build them
      # from scratch every run.
      #
      # Order (matches local-dev README):
      #   1. compute.loader        → fetches OHLCV from yfinance for the
      #                              full universe + benchmarks, writes
      #                              data/cache/ohlcv_daily.parquet
      #   2. compute.data_quality  → reads OHLCV, writes
      #                              data/cache/data_quality_report.json
      #                              (PASS / WARNING / FAIL gates)
      #   3. compute.features      → consumes both above, writes
      #                              data/cache/features.parquet
      - name: Fetch OHLCV from yfinance
        run: python -m compute.loader

      - name: Run data-quality firewall
        run: python -m compute.data_quality

      - name: Compute features
        run: python -m compute.features

      - name: Standardize features (z-scores)
        run: python -m compute.standardization

      - name: Run end-to-end pipeline
        run: python -m compute.pipeline

      - name: Build slim dashboard cache for Streamlit Cloud
        run: python -m compute.build_dashboard_cache

      - name: Commit refreshed dashboard cache to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache/dashboard/
          if git diff --cached --quiet; then
            echo "No dashboard cache changes to commit."
          else
            git commit -m "ci: refresh dashboard cache ($(date -u +%Y-%m-%d))"
            git push origin HEAD:main
          fi

      - name: Run data-dependent tests against fresh outputs
        run: |
          pip install pytest
          pytest tests/test_phase2_spot_check.py tests/test_phase3_validation.py -v --tb=short
        continue-on-error: true

      - name: Upload data/cache artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ccqs-cache-${{ github.run_number }}
          path: |
            data/cache/
            !data/cache/sandbox/
          retention-days: 90

      - name: Upload sanity-checks report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sanity-checks-${{ github.run_number }}
          path: data/cache/sanity_checks.json
          retention-days: 90
